<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team YOLO Labeling Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
</head>

<body class="bg-surface text-content h-screen overflow-hidden font-sans transition-colors duration-300">
    <div class="flex h-full">
        <!-- Global Sidebar -->
        {% if not hide_global_sidebar %}
        <nav class="w-64 bg-sidebar border-r border-border flex flex-col transition-all duration-300"
            id="globalSidebar">
            <div class="h-16 flex items-center justify-between px-4 border-b border-border">
                <div class="flex items-center gap-2 font-bold text-lg text-primary" id="brandText">
                    <i class="fa-solid fa-layer-group"></i>
                    <span data-i18n="brand">YOLO Hub</span>
                </div>
                <button class="text-content-muted hover:text-content transition-colors" onclick="toggleGlobalSidebar()"
                    title="Toggle Sidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>

            <ul class="flex-1 py-4 space-y-1">
                <li>
                    <a href="/"
                        class="flex items-center gap-3 px-4 py-3 hover:bg-panel transition-colors {{ 'bg-primary text-content-inv' if request.path == '/' else 'text-content-muted' }}">
                        <i class="fa-solid fa-house w-5 text-center"></i>
                        <span class="nav-text" data-i18n="nav_dashboard">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/export"
                        class="flex items-center gap-3 px-4 py-3 hover:bg-panel transition-colors {{ 'bg-primary text-content-inv' if request.path == '/export' else 'text-content-muted' }}">
                        <i class="fa-solid fa-file-export w-5 text-center"></i>
                        <span class="nav-text" data-i18n="nav_export">Export Dataset</span>
                    </a>
                </li>
                <li>
                    <a href="/progress"
                        class="flex items-center gap-3 px-4 py-3 hover:bg-panel transition-colors {{ 'bg-primary text-content-inv' if request.path == '/progress' else 'text-content-muted' }}">
                        <i class="fa-solid fa-chart-line w-5 text-center"></i>
                        <span class="nav-text" data-i18n="nav_progress">Tiến độ phân công</span>
                    </a>
                </li>
                <li>
                    <a href="/models-experiment"
                        class="flex items-center gap-3 px-4 py-3 hover:bg-panel transition-colors {{ 'bg-primary text-content-inv' if request.path == '/models-experiment' else 'text-content-muted' }}">
                        <i class="fa-solid fa-flask w-5 text-center"></i>
                        <span class="nav-text" data-i18n="nav_models">Thí nghiệm mô hình</span>
                    </a>
                </li>
            </ul>

            <!-- Theme Toggle -->
            <div class="p-4 border-t border-border space-y-2">
                <button onclick="toggleTheme()"
                    class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-panel border border-border rounded text-content-muted hover:text-primary transition-colors">
                    <i class="fa-solid fa-palette"></i>
                    <span class="nav-text text-sm" data-i18n="nav_theme">Switch Theme</span>
                </button>
                <button onclick="toggleLanguage()"
                    class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-panel border border-border rounded text-content-muted hover:text-primary transition-colors">
                    <i class="fa-solid fa-language"></i>
                    <span class="nav-text text-sm" data-i18n="nav_lang">Tiếng Việt</span>
                </button>
            </div>
        </nav>
        {% endif %}

        <main class="flex-1 flex flex-col min-w-0 bg-surface text-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function toggleGlobalSidebar() {
            const sidebar = document.getElementById('globalSidebar');
            const isCollapsed = sidebar.classList.contains('w-16');

            if (isCollapsed) {
                sidebar.classList.remove('w-16');
                sidebar.classList.add('w-64');
                document.querySelectorAll('.nav-text').forEach(el => el.style.display = 'block');
                document.getElementById('brandText').querySelector('span').style.display = 'block';
            } else {
                sidebar.classList.remove('w-64');
                sidebar.classList.add('w-16');
                document.querySelectorAll('.nav-text').forEach(el => el.style.display = 'none');
                document.getElementById('brandText').querySelector('span').style.display = 'none';
            }

            localStorage.setItem('sidebar-collapsed', !isCollapsed);
        }

        function applyTheme(theme) {
            const isPink = theme === 'pink';
            const root = document.documentElement;
            const body = document.body;
            const vars = isPink ? {
                '--color-surface-val': '#fff0f5',
                '--color-sidebar-val': '#ffe4e1',
                '--color-panel-val': '#ffffff',
                '--color-border-val': '#ffb6c1',
                '--color-primary-val': '#ff69b4',
                '--color-secondary-val': '#ff1493',
                '--color-accent-val': '#ff6347',
                '--color-text-val': '#4a4a4a',
                '--color-text-muted-val': '#8b8b8b',
                '--color-text-inv-val': '#ffffff',
            } : {
                '--color-surface-val': '#0d1117',
                '--color-sidebar-val': '#1f2937',
                '--color-panel-val': '#111827',
                '--color-border-val': '#374151',
                '--color-primary-val': '#3b82f6',
                '--color-secondary-val': '#22c55e',
                '--color-accent-val': '#eab308',
                '--color-text-val': '#e5e7eb',
                '--color-text-muted-val': '#9ca3af',
                '--color-text-inv-val': '#ffffff',
            };

            root.dataset.theme = isPink ? 'pink' : 'dark';
            body.classList.toggle('pink-mode', isPink);
            body.dataset.theme = isPink ? 'pink' : 'dark';

            Object.entries(vars).forEach(([name, value]) => {
                root.style.setProperty(name, value);
                body.style.setProperty(name, value);
            });

            localStorage.setItem('theme', isPink ? 'pink' : 'dark');
        }

        function toggleTheme() {
            const isPink = localStorage.getItem('theme') !== 'pink';
            applyTheme(isPink ? 'pink' : 'dark');
        }

        window.toggleTheme = toggleTheme;

        // Restore state
        // Sidebar
        if (localStorage.getItem('sidebar-collapsed') === 'true') {
            const sidebar = document.getElementById('globalSidebar');
            if (sidebar) {
                sidebar.classList.remove('w-64');
                sidebar.classList.add('w-16');
                document.querySelectorAll('.nav-text').forEach(el => el.style.display = 'none');
                let brandSpan = document.getElementById('brandText')?.querySelector('span');
                if (brandSpan) brandSpan.style.display = 'none';
            }
        }

        // Theme
        applyTheme(localStorage.getItem('theme') === 'pink' ? 'pink' : 'dark');

        // Global Toast
        window.showToast = function(message, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
            toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 ${bgColor} text-white px-5 py-2.5 rounded-lg shadow-2xl text-sm font-medium z-[9999] transition-all duration-300 flex items-center gap-2`;
            const icon = type === 'success' ? 'fa-circle-check' : type === 'error' ? 'fa-circle-xmark' : 'fa-circle-info';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> ${message}`;
            document.body.appendChild(toast);
            
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(20px)';
            requestAnimationFrame(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateX(-50%) translateY(0)';
            });

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
